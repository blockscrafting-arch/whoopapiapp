# WHOOP PWA — reverse proxy для Nginx
#
# ВАЖНО: этот файл настроен так, чтобы `nginx -t` проходил СРАЗУ после копирования
# на сервер — без ссылок на несуществующие сертификаты Let's Encrypt.
#
# Порядок на проде:
#   1) Скопировать в sites-available, поправить server_name при необходимости.
#   2) Включить сайт, перезапустить nginx — открывается HTTP :80.
#   3) Выпустить сертификат: certbot --nginx -d ваш-домен
#   4) Certbot сам допишет listen 443 и ssl_certificate (или объедините конфиг вручную).
#
# Замените prowhoop.ru / www на свой домен, если другой.

upstream whoop_pwa_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name prowhoop.ru www.prowhoop.ru;

    client_max_body_size 2m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location / {
        proxy_pass http://whoop_pwa_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}

# После `certbot --nginx` обычно появляется второй server { listen 443 ssl ... }.
# Тогда для редиректа с HTTP на HTTPS можно заменить блок :80 выше на:
#
#   server {
#       listen 80;
#       listen [::]:80;
#       server_name prowhoop.ru www.prowhoop.ru;
#       return 301 https://$host$request_uri;
#   }
#
# А прокси location / оставить только в server на порту 443 (как настроит certbot).
